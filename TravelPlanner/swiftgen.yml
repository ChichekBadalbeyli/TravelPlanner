# SwiftGen config — run from project root: swiftgen
# Install: brew install swiftgen
input_dir: TravelPlanner
output_dir: TravelPlanner/Generated

strings:
  inputs: Resources/en.lproj
  filter: ".+\.strings$"
  outputs:
    - templateName: structured-swift5
      output: L10n.swift
      params:
        enumName: L10n

xcassets:
  inputs: Assets.xcassets
  outputs:
    - templateName: swift5
      output: Assets.swift
      params:
        enumName: Asset
